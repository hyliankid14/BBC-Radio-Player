name: Build Debug APK

# Builds a debug APK for sideloading on a device.  No signing keys are needed
# for debug builds — the APK is signed automatically with the Android debug
# keystore.  The resulting APK is uploaded as a workflow artifact AND published
# as a GitHub pre-release so it can be downloaded via a direct link without
# needing to navigate through the Actions UI.

on:
  workflow_dispatch:       # allow manual trigger from the Actions tab

permissions:
  contents: write          # needed to create/update the rolling per-branch pre-release

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required so 'git describe' can find tags

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APKs
        run: ./gradlew assembleDebug

      - name: Upload debug APKs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: app/build/outputs/apk/**/debug/*.apk
          retention-days: 14

      - name: Publish debug APK as pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Derive a safe git tag from the branch name (replace / and other
          # characters that are invalid in git refs with hyphens).
          BRANCH="${{ github.ref_name }}"
          TAG="debug-apk-${BRANCH//\//-}"
          TAG="${TAG//[^a-zA-Z0-9._-]/-}"

          APK=$(find app/build/outputs/apk -name "*debug*.apk" | head -1)

          # Replace any previous release/tag for this branch so the tag always
          # points to the latest build.
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create a new pre-release and attach the APK.
          gh release create "$TAG" "$APK" \
            --title "Debug APK · $BRANCH" \
            --notes "Debug build from branch \`$BRANCH\`, commit \`${{ github.sha }}\`." \
            --prerelease

          APK_URL=$(gh release view "$TAG" --json assets -q '.assets[0].browserDownloadUrl')

          {
            echo "## 📱 Debug APK"
            echo ""
            echo "**[⬇️ Direct download]($APK_URL)**"
            echo ""
            echo "Branch: \`$BRANCH\`  |  Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
