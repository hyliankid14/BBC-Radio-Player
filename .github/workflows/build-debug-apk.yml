name: Build Debug APK

# Builds a debug APK for sideloading on a device.  No signing keys are needed
# for debug builds — the APK is signed with the shared debug keystore committed
# at keystore/debug.keystore (same key used by the local-deploy script) so that
# CI-built APKs can upgrade-in-place over locally installed debug builds.

on:
  workflow_dispatch:       # allow manual trigger from the Actions tab

permissions:
  contents: read           # read-only checkout; no write access needed

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required so 'git describe' can find tags

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build github debug APK
        run: ./gradlew assembleGithubDebug

      - name: Upload debug APK
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/github/debug/*.apk
          retention-days: 14

      - name: Print download instructions
        run: |
          {
            echo "## 📱 Debug APK"
            echo ""
            echo "The APK was uploaded as a workflow artifact named **debug-apk**."
            echo ""
            echo "**How to download:**"
            echo "1. Go to the [Actions run summary](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "2. Scroll to the **Artifacts** section at the bottom of the page"
            echo "3. Click **debug-apk** to download the zip containing the APK"
            echo ""
            echo "This APK is signed with the shared \`keystore/debug.keystore\` — the same"
            echo "key used by the local-deploy script — so it installs over an existing"
            echo "debug build without needing to uninstall first."
          } >> "$GITHUB_STEP_SUMMARY"
