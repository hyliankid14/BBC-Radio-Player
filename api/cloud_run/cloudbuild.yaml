# Cloud Build configuration for building and pushing the BBC index-builder image.
# Run from the repository root:
#   gcloud builds submit --config api/cloud_run/cloudbuild.yaml api/
#
# Substitute YOUR_PROJECT with your GCP project ID, or let Cloud Build
# populate it automatically via the built-in $PROJECT_ID substitution.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/bbc-index-builder'
      - '-f'
      - 'cloud_run/Dockerfile'  # path relative to the api/ build context
      - '.'                     # build context is api/ (passed by gcloud builds submit)

images:
  - 'gcr.io/$PROJECT_ID/bbc-index-builder'
